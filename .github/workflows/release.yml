name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name snapforge --paths src src/snapforge/__main__.py

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          tar -czf snapforge-linux-x86_64.tar.gz -C dist snapforge

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/snapforge.exe -DestinationPath snapforge-windows-x86_64.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: snapforge-linux-x86_64
          path: snapforge-linux-x86_64.tar.gz

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: snapforge-windows-x86_64
          path: snapforge-windows-x86_64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/**/*.tar.gz
            assets/**/*.zip
          generate_release_notes: true
